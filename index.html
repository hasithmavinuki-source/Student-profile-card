<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card {
            background: #fff;
            width: 320px;
            padding: 2.5rem 1.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .image-placeholder {
            width: 120px;
            height: 120px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 0.8rem;
            border: 4px solid #f8f9fa;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #2d3436;
        }

        .stream {
            font-size: 0.9rem;
            font-weight: 400;
            color: #6c5ce7;
            margin-bottom: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #636e72;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="image-placeholder">
            <span>Profile Photo</span>
        </div>
        <div class="card-content">
            <h1 class="name">Jane Doe</h1>
            <p class="stream">Computer Science</p>
            <p class="bio">Passionate software developer and lifelong learner. Love exploring new technologies and building impactful applications. 🚀</p>
        </div>
    </div>
</body>
</html>
